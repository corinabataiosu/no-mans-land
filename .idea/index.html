<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>No Man's Land</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #8db8e6; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<!-- importmap tells the browser where to resolve modules "three" and "three/addons.*" -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    // import three.js library
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // main scene container
    const scene = new THREE.Scene();

    // camera with a degree of 55, near clipping at unit 1 and far clipping at unit 15 000
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1.0, 15000.0);
    // camera position
    // X = 0
    // Y = 100 slightly above ground
    // Z = 800 pulled back from the center
    const camPos = new THREE.Vector3(0, 100, 800);
    camera.position.copy(camPos);

    // webgl renderer with antialias for smoother edges
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // enable shadows
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; // smoother edges for the shadows
    document.body.appendChild(renderer.domElement);

    // orbit controls for rotation and zooming
    // damping for inertia when we stop moving
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // texture loader used for the images stored in 'textures/'
    const loader = new THREE.TextureLoader();
    const texPath = 'textures/';

    // textures
    const texGround = loader.load(texPath + 'ground.jpg');
    texGround.wrapS = texGround.wrapT = THREE.RepeatWrapping;

    const texRock = loader.load(texPath + 'rock.jpg');
    texRock.wrapS = texRock.wrapT = THREE.RepeatWrapping;

    const texWall = loader.load(texPath + 'wall.jpg');
    const texWood = loader.load(texPath + 'wood.jpg');

    const texTrack = loader.load(texPath + 'track.jpg');
    texTrack.wrapS = texTrack.wrapT = THREE.RepeatWrapping;

    // helper function that mirrors the skybox side texture horizontally
    function loadFixedSkyTexture(path) {
        const tex = loader.load(texPath + path);
        tex.wrapS = THREE.RepeatWrapping;
        tex.repeat.set(-1, 1); // setting repeat x to -1 mirrors the image
        return tex;
    }

    // load the 4 sides of the cube using loadFixedSkyTexture
    const texPart1 = loadFixedSkyTexture('part1.jpg'); // X+ right
    const texPart2 = loadFixedSkyTexture('part2.jpg'); // X- left
    const texPart3 = loadFixedSkyTexture('part3.jpg'); // Z+ front
    const texPart4 = loadFixedSkyTexture('part4.jpg'); // Z- back

    // ambiental light to illuminate all surfaces equally
    scene.add(new THREE.AmbientLight(0xffffff, 0.10));

    // orangey directional light to give a dawn atmosphere
    const sun = new THREE.DirectionalLight(0xffccaa, 0.3);
    sun.position.set(-200, 300, 200);

    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.left = -1000;
    sun.shadow.camera.right = 1000;
    sun.shadow.camera.top = 1000;
    sun.shadow.camera.bottom = -1000;
    sun.shadow.camera.far = 3000;

    scene.add(sun);

    // skybox
    const colorTop = 0x87CEEB; // blue for the top side
    const colorBottom = 0xccbba3; // beige for the down side
    const skyMaterials = [
        new THREE.MeshBasicMaterial({ map: texPart1, side: THREE.BackSide }), // X+ right
        new THREE.MeshBasicMaterial({ map: texPart2, side: THREE.BackSide }), // X- left
        new THREE.MeshBasicMaterial({ color: colorTop, side: THREE.BackSide }), // Y+ up
        new THREE.MeshBasicMaterial({ color: colorBottom, side: THREE.BackSide }), // Y- down
        new THREE.MeshBasicMaterial({ map: texPart3, side: THREE.BackSide }), // Z+ front
        new THREE.MeshBasicMaterial({ map: texPart4, side: THREE.BackSide })  // Z- back
    ];

    const skyGeo = new THREE.BoxGeometry(8000, 8000, 8000);
    const skyCube = new THREE.Mesh(skyGeo, skyMaterials);
    scene.add(skyCube);

    // ground
    const sandMaterial = new THREE.MeshPhongMaterial({ map: texGround, shininess: 5 });
    const TEXTURE_SCALE = 80;

    const floorGeo = new THREE.PlaneGeometry(2000, 2000);
    const floorPos = floorGeo.attributes.position;
    const floorUv = floorGeo.attributes.uv;

    // divide each vertex uv based on world posiion divided by scale so tiles are uniform size
    for (let i = 0; i < floorPos.count; i++) {
        let lx = floorPos.getX(i);
        let ly = floorPos.getY(i);
        floorUv.setXY(i, lx / TEXTURE_SCALE, -ly / TEXTURE_SCALE);
    }

    // rotate plane -90 degrees on X axis to lay flat on the ground
    const floor = new THREE.Mesh(floorGeo, sandMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    let spherePlayer;
    const sphereSpeed = 8;
    const buildingColliders = [];

    // methods

    // creates a cliff alongside one of the sides
    // cx - x coordinate of the center
    // cz - z coordinate of the center
    // width - width of the cliff
    // length - length of the cliff
    // maxHeight - maximum height of the cliff
    function createCliff(cx, cz, width, length, maxHeight) {
        const geo = new THREE.PlaneGeometry(width, length, 100, 150);
        geo.rotateX(-Math.PI / 2);

        const pos = geo.attributes.position;
        // random seed offset the sine waves so each cliff looks different
        const seed = Math.random() * 100;

        for (let i = 0; i < pos.count; i++) {
            let px = pos.getX(i);
            const pz = pos.getZ(i);

            // factor goes from 0 at the right edge ato 1 at the left edge
            let factor = (width / 2 - px) / width;
            let mask = 0;

            if (factor < 0.05) {
                mask = (factor / 0.05) * 0.8;
            } else {
                mask = 0.8 + ((factor - 0.05) / 0.95) * 0.2;
            }

            if (mask > 0) {
                // large sine wave create the overall ondulation of the cliff top
                let baseWave = Math.sin(pz * 0.02 + seed) * 40 + Math.cos(pz * 0.05 + seed) * 20;
                // random offsets add small scale roughness in both y and x directions
                let jaggedY = (Math.random() - 0.5) * 45;
                let jaggedX = (Math.random() - 0.5) * 25;

                let y = (maxHeight + baseWave + jaggedY) * mask;
                if (y < 0) y = 0;

                let finalX = px;
                // near the cliff edge also shift vertices horizontally for an overhanging look
                if (factor > 0.01 && factor < 0.1) {
                    finalX += jaggedX;
                }

                pos.setXYZ(i, finalX, y, pz);
            }
        }

        // recompute normals after displacing vertices so lighting is correct
        geo.computeVertexNormals();

        // flat shading
        const mat = new THREE.MeshPhongMaterial({ map: texRock, flatShading: true, shininess: 0 });
        const cliff = new THREE.Mesh(geo, mat);
        cliff.position.set(cx, -1, cz);
        cliff.castShadow = true; // cast shadows
        cliff.receiveShadow = true; // receive shadows
        scene.add(cliff);
    }

    // creates a standalone boulder in a circular shape
    // vertices near the center rise the most and fall to 0 at edges
    // flat shading and rock texture
    // cx - x coordinate of the center
    // cz - z cooridnate of the center
    // size - length and width of the rock
    // maxHeight - maximum Height
    function createRock(cx, cz, size, maxHeight) {
        const segments = 64;
        const geo = new THREE.PlaneGeometry(size, size, segments, segments);
        geo.rotateX(-Math.PI / 2);

        const pos = geo.attributes.position;
        const seed = Math.random() * 100;

        for (let i = 0; i < pos.count; i++) {
            const px = pos.getX(i);
            const pz = pos.getZ(i);
            const d = Math.sqrt(px * px + pz * pz); // distance from center
            const radius = size / 2;

            let mask = Math.pow(Math.max(0, 1 - (d / radius)), 1.3);

            if (mask > 0) {
                let baseWave = Math.sin(px * 0.05 + seed) * 15 + Math.cos(pz * 0.08 + seed) * 12;
                let jagged = (Math.random() - 0.5) * 15;
                let y = (maxHeight + baseWave + jagged) * mask;
                if (y < 0) y = 0;
                pos.setY(i, y);
            }
        }

        geo.computeVertexNormals();

        const mat = new THREE.MeshPhongMaterial({ map: texRock, flatShading: true, shininess: 0 });
        const rock = new THREE.Mesh(geo, mat);
        rock.position.set(cx, -1, cz);
        rock.rotation.y = Math.random() * Math.PI; // random rotation for asymmetry
        rock.castShadow = true;
        rock.receiveShadow = true;
        scene.add(rock);
    }

    // creates a sand dune
    // the profile is 0 at edge and peaks at center
    // radius - radius of the dune
    // maxHeight - height
    function createDune(cx, cz, radius, maxHeight) {
        const geo = new THREE.PlaneGeometry(radius * 2, radius * 2, 40, 40);
        const pos = geo.attributes.position;
        const uv = geo.attributes.uv;

        for (let i = 0; i < pos.count; i++) {
            const lx = pos.getX(i);
            const ly = pos.getY(i);
            const d = Math.sqrt(lx**2 + ly**2);

            // cosine squared gives a smooth shaped profile at both the peak and the base
            if (d < radius) pos.setZ(i, maxHeight * Math.pow(Math.cos((d / radius) * (Math.PI / 2)), 2));
            uv.setXY(i, (cx + lx) / TEXTURE_SCALE, (cz - ly) / TEXTURE_SCALE);
        }
        geo.computeVertexNormals();

        const mesh = new THREE.Mesh(geo, sandMaterial);
        mesh.position.set(cx, 0.2, cz);
        mesh.rotation.x = -Math.PI / 2;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
    }

    // creates a simple rectangular building
    // the box is raised by half its height so its base sits exactly on y = 0
    function createBuilding(x, z, height) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(80, height, 80), new THREE.MeshPhongMaterial({ map: texWall, color: 0xfff2cc }));
        b.position.set(x, height / 2, z);
        b.castShadow = true;
        b.receiveShadow = true;
        scene.add(b);

        b.updateMatrixWorld();
        const bbox = new THREE.Box3().setFromObject(b); // create a box the same size as building
        buildingColliders.push(bbox);
    }

    // creates a grave consisting of a small dune plus a cross
    // the cross is made of two box geometries: a vertical and a horizontal beam
    function createGrave(x, z, rot) {
        createDune(x, z, 20, 6);
        const group = new THREE.Group();
        const mat = new THREE.MeshPhongMaterial({ map: texWood, color: 0x80664d });
        const v = new THREE.Mesh(new THREE.BoxGeometry(2, 15, 2), mat); v.position.y = 7.5;
        const h = new THREE.Mesh(new THREE.BoxGeometry(8, 2, 2), mat); h.position.y = 10;
        v.castShadow = true; v.receiveShadow = true;
        h.castShadow = true; h.receiveShadow = true;
        group.add(v, h); group.position.set(x, 1, z); group.rotation.y = rot * (Math.PI / 180);
        scene.add(group);
    }

        // creates a rectangular track using shape geometry
    function createTrack(cx, cz, lengthX, widthZ, trackWidth) {
        const shape = new THREE.Shape();

        // rectangle
        const hw = lengthX / 2;
        const hl = widthZ / 2;
        shape.moveTo(-hw, -hl); shape.lineTo(hw, -hl); shape.lineTo(hw, hl); shape.lineTo(-hw, hl); shape.lineTo(-hw, -hl);

        // hole inside
        const hole = new THREE.Path();
        const in_hw = hw - trackWidth;
        const in_hl = hl - trackWidth;
        hole.moveTo(-in_hw, -in_hl); hole.lineTo(in_hw, -in_hl); hole.lineTo(in_hw, in_hl); hole.lineTo(-in_hw, in_hl); hole.lineTo(-in_hw, -in_hl);
        shape.holes.push(hole);

        const geo = new THREE.ShapeGeometry(shape);
        geo.rotateX(-Math.PI / 2);

        const pos = geo.attributes.position;
        const uv = geo.attributes.uv;
        for (let i = 0; i < pos.count; i++) uv.setXY(i, pos.getX(i) / 50, -pos.getZ(i) / 50);

        const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, map: texTrack, side: THREE.DoubleSide });
        const track = new THREE.Mesh(geo, mat);
        track.position.set(cx, 0.5, cz);
        track.receiveShadow = true;
        scene.add(track);
    }

    function createStreetLight(x, z) {
        const group = new THREE.Group();

        // metal part of the street light
        const postGeo = new THREE.CylinderGeometry(2, 2, 80, 8);
        const postMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const post = new THREE.Mesh(postGeo, postMat);
        post.position.y = 40;
        post.castShadow = true;
        post.receiveShadow = true;
        group.add(post);

        // the light part of the street light
        const bulbGeo = new THREE.SphereGeometry(5, 16, 16);
        // MeshBasicMaterial so it looks like its shining
        const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffdd88 });
        const bulb = new THREE.Mesh(bulbGeo, bulbMat);
        bulb.position.y = 82;
        group.add(bulb);

        // real source of light

        const light = new THREE.SpotLight(0xffdd88, 7000);
        light.position.set(0, 80, 0);

        // light goes down
        light.target.position.set(0, 0, 0);
        group.add(light.target);

        // big light cone so it catches the buildings
        light.angle = Math.PI / 2.2;
        light.penumbra = 0.5;
        light.distance = 2000;

        light.castShadow = true;

        light.shadow.mapSize.width = 1024;
        light.shadow.mapSize.height = 1024;
        light.shadow.camera.near = 10;
        light.shadow.camera.far = 1500;
        light.shadow.bias = -0.0005;
        group.add(light);

        group.position.set(x, 0, z);
        scene.add(group);
    }

    function createSphere() {
        const geo = new THREE.SphereGeometry(10, 32, 16);

        const mat = new THREE.MeshPhongMaterial({ color: 0x650015, shininess: 30 });

        spherePlayer = new THREE.Mesh(geo, mat);
        spherePlayer.castShadow = true;
        spherePlayer.receiveShadow = true;

        // Y = 10 so its all the way on the ground
        // Z = 500 next to town
        spherePlayer.position.set(0, 10, 500);

        scene.add(spherePlayer);
    }

    // initialization

    // createCliff(center_x, center_z, width, length, maxHeight)
    createCliff(-800, 0, 300, 2000, 400);

    // create rock(center_x, center_z, size, maxHeight)
    createRock(-300, -500, 350, 180);
    createRock(100, -650, 450, 220);
    createRock(600, -450, 350, 150);

    // createDune(center_x, center_z, radius, height)
    createDune(-350, 250, 300, 10);
    createDune(200, -150, 450, 40);
    createDune(300, 400, 350, 30);

    const houseCoords = [[380,380],[510,350],[650,380],[420,500],[550,470],[680,510],[460,620],[600,600],[730,630],[780,450],[500,750],[650,720],[800,780],[580,850],[720,830]];
    houseCoords.forEach((c, i) => createBuilding(c[0] - 200, c[1] - 150, i % 2 === 0 ? 120 : 150));

    // createTrack(center_x, center_z, innerRadius, outerRadius)
    createTrack(300, 400, 900, 900, 80);

    const minX = -150;
    const maxX = 750;
    const minZ = -50;
    const maxZ = 850;

    for (let i = 0; i <= 3; i++) {
        let x = minX + i * ((maxX - minX) / 3);
        let z = minZ + i * ((maxZ - minZ) / 3);

        // up and downside
        createStreetLight(x, minZ);
        createStreetLight(x, maxZ);

        // left and right side
        if (i > 0 && i < 3) {
            createStreetLight(minX, z);
            createStreetLight(maxX, z);
        }
    }

    // createGrave(center_x, center_z, rotation)
    for(let i=0; i<5; i++) {
        for(let j=0; j<6; j++) {
            createGrave(-400 + j * 60 + (i % 2) * 15, -250 + i * 50, (i * 7 + j * 13) % 11);
        }
    }

    createSphere();

    // movements
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    // w and s - move forward and backward
    // a and d - move left and right
    // q and e - move up and down
    function handleMovement() {
        const speed = 15;
        const forward = new THREE.Vector3();
        camera.getWorldDirection(forward);
        forward.y = 0;
        forward.normalize();
        const right = new THREE.Vector3().crossVectors(forward, camera.up);

        if (keys['w']) { camera.position.addScaledVector(forward, speed); controls.target.addScaledVector(forward, speed); }
        if (keys['s']) { camera.position.addScaledVector(forward, -speed); controls.target.addScaledVector(forward, -speed); }
        if (keys['a']) { camera.position.addScaledVector(right, -speed); controls.target.addScaledVector(right, -speed); }
        if (keys['d']) { camera.position.addScaledVector(right, speed); controls.target.addScaledVector(right, speed); }
        if (keys['q']) { camera.position.y -= speed; controls.target.y -= speed; }
        if (keys['e']) { camera.position.y += speed; controls.target.y += speed; }
    }

    function checkCollisions() {
        // create a sphere on the player so we detect collision
        const playerCollider = new THREE.Sphere(spherePlayer.position, 10);

        // check if the sphere touches the box
        for (let i = 0; i < buildingColliders.length; i++) {
            if (buildingColliders[i].intersectsSphere(playerCollider)) {
                return true;
            }
        }
        return false;
    }

    // player control
    function handlePlayerMovement() {
        if (!spherePlayer) return;

        const oldX = spherePlayer.position.x;
        const oldZ = spherePlayer.position.z;

        if (keys['arrowup']) { spherePlayer.position.z -= sphereSpeed; }
        if (keys['arrowdown']) { spherePlayer.position.z += sphereSpeed; }
        if (checkCollisions()) {
            spherePlayer.position.z = oldZ; // if collision, undo movement on x axis
        }
        if (keys['arrowleft']) { spherePlayer.position.x -= sphereSpeed; }
        if (keys['arrowright']) { spherePlayer.position.x += sphereSpeed; }
        if (checkCollisions()) {
            spherePlayer.position.x = oldX; // if collision, undo movement on z axis
        }

        // limit the movement so it cant leave the plane
        const limit = 990; // 1000 - 10 (radius)
        spherePlayer.position.x = THREE.MathUtils.clamp(spherePlayer.position.x, -limit, limit);
        spherePlayer.position.z = THREE.MathUtils.clamp(spherePlayer.position.z, -limit, limit);
    }

    // main render loop called every frame via requestanimationframe
    // processes keyboard input, updates orbit controls damping, then renders the scene
    function animate() {
        requestAnimationFrame(animate);
        handleMovement();
        handlePlayerMovement();
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // update camera aspect ratio and renderer size whenever the browser window is resized
    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
