<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>No Man's Land</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #8db8e6; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<!-- importmap tells the browser where to resolve modules "three" and "three/addons.*" -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    // import three.js library
    import * as THREE from 'three';

    // main scene container
    const scene = new THREE.Scene();

    // camera with a degree of 55, near clipping at unit 1 and far clipping at unit 15 000
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1.0, 15000.0);
    // camera position
    // X = 0
    // Y = 100 slightly above ground
    // Z = 800 pulled back from the center
    const camPos = new THREE.Vector3(0, 100, 800);
    camera.position.copy(camPos);

    // webgl renderer with antialias for smoother edges
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    camera.lookAt(0, 80, 0);

    // texture loader used for the images stored in 'textures/'
    const loader = new THREE.TextureLoader();
    const texPath = 'textures/';

    // textures
    const texGround = loader.load(texPath + 'ground.jpg');
    texGround.wrapS = texGround.wrapT = THREE.RepeatWrapping;

    const texRock = loader.load(texPath + 'rock.jpg');
    texRock.wrapS = texRock.wrapT = THREE.RepeatWrapping;

    // helper function that mirrors the skybox side texture horizontally
    function loadFixedSkyTexture(path) {
        const tex = loader.load(texPath + path);
        tex.wrapS = THREE.RepeatWrapping;
        tex.repeat.set(-1, 1); // setting repeat x to -1 mirrors the image
        return tex;
    }

    // load the 4 sides of the cube using loadFixedSkyTexture
    const texPart1 = loadFixedSkyTexture('part1.jpg'); // X+ right
    const texPart2 = loadFixedSkyTexture('part2.jpg'); // X- left
    const texPart3 = loadFixedSkyTexture('part3.jpg'); // Z+ front
    const texPart4 = loadFixedSkyTexture('part4.jpg'); // Z- back

    // ambiental light to illuminate all surfaces equally
    scene.add(new THREE.AmbientLight(0xffffff, 0.10));

    // orangey directional light to give a dawn atmosphere
    const sun = new THREE.DirectionalLight(0xffccaa, 1.0);
    sun.position.set(-200, 300, 200);
    scene.add(sun);

    // skybox
    const colorTop = 0x87CEEB; // blue for the top side
    const colorBottom = 0xccbba3; // beige for the down side
    const skyMaterials = [
        new THREE.MeshBasicMaterial({ map: texPart1, side: THREE.BackSide }), // X+ right
        new THREE.MeshBasicMaterial({ map: texPart2, side: THREE.BackSide }), // X- left
        new THREE.MeshBasicMaterial({ color: colorTop, side: THREE.BackSide }), // Y+ up
        new THREE.MeshBasicMaterial({ color: colorBottom, side: THREE.BackSide }), // Y- down
        new THREE.MeshBasicMaterial({ map: texPart3, side: THREE.BackSide }), // Z+ front
        new THREE.MeshBasicMaterial({ map: texPart4, side: THREE.BackSide })  // Z- back
    ];

    const skyGeo = new THREE.BoxGeometry(8000, 8000, 8000);
    const skyCube = new THREE.Mesh(skyGeo, skyMaterials);
    scene.add(skyCube);

    // ground
    const sandMaterial = new THREE.MeshPhongMaterial({ map: texGround, shininess: 5 });
    const TEXTURE_SCALE = 80;

    const floorGeo = new THREE.PlaneGeometry(2000, 2000);
    const floorPos = floorGeo.attributes.position;
    const floorUv = floorGeo.attributes.uv;

    // divide each vertex uv based on world posiion divided by scale so tiles are uniform size
    for (let i = 0; i < floorPos.count; i++) {
        let lx = floorPos.getX(i);
        let ly = floorPos.getY(i);
        floorUv.setXY(i, lx / TEXTURE_SCALE, -ly / TEXTURE_SCALE);
    }

    // rotate plane -90 degrees on X axis to lay flat on the ground
    const floor = new THREE.Mesh(floorGeo, sandMaterial);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // methods

    // creates a cliff alongside one of the sides
    // cx - x coordinate of the center
    // cz - z coordinate of the center
    // width - width of the cliff
    // length - length of the cliff
    // maxHeight - maximum height of the cliff
    function createCliff(cx, cz, width, length, maxHeight) {
        const geo = new THREE.PlaneGeometry(width, length, 100, 150);
        geo.rotateX(-Math.PI / 2);

        const pos = geo.attributes.position;
        // random seed offset the sine waves so each cliff looks different
        const seed = Math.random() * 100;

        for (let i = 0; i < pos.count; i++) {
            let px = pos.getX(i);
            const pz = pos.getZ(i);

            // factor goes from 0 at the right edge ato 1 at the left edge
            let factor = (width / 2 - px) / width;
            let mask = 0;

            if (factor < 0.05) {
                mask = (factor / 0.05) * 0.8;
            } else {
                mask = 0.8 + ((factor - 0.05) / 0.95) * 0.2;
            }

            if (mask > 0) {
                // large sine wave create the overall ondulation of the cliff top
                let baseWave = Math.sin(pz * 0.02 + seed) * 40 + Math.cos(pz * 0.05 + seed) * 20;
                // random offsets add small scale roughness in both y and x directions
                let jaggedY = (Math.random() - 0.5) * 45;
                let jaggedX = (Math.random() - 0.5) * 25;

                let y = (maxHeight + baseWave + jaggedY) * mask;
                if (y < 0) y = 0;

                let finalX = px;
                // near the cliff edge also shift vertices horizontally for an overhanging look
                if (factor > 0.01 && factor < 0.1) {
                    finalX += jaggedX;
                }

                pos.setXYZ(i, finalX, y, pz);
            }
        }

        // recompute normals after displacing vertices so lighting is correct
        geo.computeVertexNormals();

        // flat shading
        const mat = new THREE.MeshPhongMaterial({ map: texRock, flatShading: true, shininess: 0 });
        const cliff = new THREE.Mesh(geo, mat);
        cliff.position.set(cx, -1, cz);
        scene.add(cliff);
    }

    // creates a standalone boulder in a circular shape
    // vertices near the center rise the most and fall to 0 at edges
    // flat shading and rock texture
    // cx - x coordinate of the center
    // cz - z cooridnate of the center
    // size - length and width of the rock
    // maxHeight - maximum Height
    function createRock(cx, cz, size, maxHeight) {
        const segments = 64;
        const geo = new THREE.PlaneGeometry(size, size, segments, segments);
        geo.rotateX(-Math.PI / 2);

        const pos = geo.attributes.position;
        const seed = Math.random() * 100;

        for (let i = 0; i < pos.count; i++) {
            const px = pos.getX(i);
            const pz = pos.getZ(i);
            const d = Math.sqrt(px * px + pz * pz); // distance from center
            const radius = size / 2;

            let mask = Math.pow(Math.max(0, 1 - (d / radius)), 1.3);

            if (mask > 0) {
                let baseWave = Math.sin(px * 0.05 + seed) * 15 + Math.cos(pz * 0.08 + seed) * 12;
                let jagged = (Math.random() - 0.5) * 15;
                let y = (maxHeight + baseWave + jagged) * mask;
                if (y < 0) y = 0;
                pos.setY(i, y);
            }
        }

        geo.computeVertexNormals();

        const mat = new THREE.MeshPhongMaterial({ map: texRock, flatShading: true, shininess: 0 });
        const rock = new THREE.Mesh(geo, mat);
        rock.position.set(cx, -1, cz);
        rock.rotation.y = Math.random() * Math.PI; // random rotation for asymmetry
        scene.add(rock);
    }

    // creates a sand dune
    // the profile is 0 at edge and peaks at center
    // radius - radius of the dune
    // maxHeight - height
    function createDune(cx, cz, radius, maxHeight) {
        const geo = new THREE.PlaneGeometry(radius * 2, radius * 2, 40, 40);
        const pos = geo.attributes.position;
        const uv = geo.attributes.uv;

        for (let i = 0; i < pos.count; i++) {
            const lx = pos.getX(i);
            const ly = pos.getY(i);
            const d = Math.sqrt(lx**2 + ly**2);

            // cosine squared gives a smooth shaped profile at both the peak and the base
            if (d < radius) pos.setZ(i, maxHeight * Math.pow(Math.cos((d / radius) * (Math.PI / 2)), 2));
            uv.setXY(i, (cx + lx) / TEXTURE_SCALE, (cz - ly) / TEXTURE_SCALE);
        }
        geo.computeVertexNormals();

        const mesh = new THREE.Mesh(geo, sandMaterial);
        mesh.position.set(cx, 0.2, cz);
        mesh.rotation.x = -Math.PI / 2;
        scene.add(mesh);
    }

    // initialization

    // createCliff(center_x, center_z, width, length, maxHeight)
    createCliff(-800, 0, 300, 2000, 400);

    // create rock(center_x, center_z, size, maxHeight)
    createRock(-300, -500, 350, 180);
    createRock(100, -650, 450, 220);
    createRock(600, -450, 350, 150);

    // createDune(center_x, center_z, radius, height)
    createDune(-350, 250, 300, 10);
    createDune(200, -150, 450, 40);
    createDune(300, 400, 350, 30);

    // main render loop called every frame via requestanimationframe
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    // update camera aspect ratio and renderer size whenever the browser window is resized
    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
